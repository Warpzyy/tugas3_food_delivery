<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Waktu Pengiriman</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh">

    <div class="card p-5 text-center shadow-lg" style="width: 400px;">

        <h2 class="title mb-3">Prediksi Waktu Pengiriman</h2>
        <p>Prediksi waktu pengiriman makanan / barang</p>

        <form method="POST">
            <input type="number" step="0.1" name="jarak" class="form-control mb-3" placeholder="Masukkan jarak (km)" required>
            <button class="btn btn-custom w-100">Prediksi Sekarang</button>
        </form>

        {% if hasil %}
        <div class="alert alert-success mt-4 result-box">
            ⏱️ Estimasi waktu:
            <br>
            <span style="font-size:30px;">{{ hasil }} menit</span>
        </div>
        {% endif %}

        <img src="{{ url_for('static', filename='plot.png') }}" class="img-fluid mt-3 rounded">

    </div>

</div>

</body>
</html>
